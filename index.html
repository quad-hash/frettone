<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FretTone | ジャズギター コードトーン・スケール 指板確認 無料Webアプリ</title>
  <meta name="description" content="FretToneは、ジャズギター初心者がコードトーン・スケール・度数をギター指板上で確認できる無料Webアプリです。ii-V-I、コードトーン練習、アドリブ練習の補助に使えます。" />
  <meta name="keywords" content="ジャズギター,コードトーン,スケール,度数,指板,ii-V-I,アドリブ,ギター初心者,無料" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      background: #0e0e0e;
      color: #eee;
    }

    header {
      padding: 18px 24px;
      border-bottom: 1px solid #222;
    }

    h1 {
      margin: 0 0 2px;
      font-size: 24px;
      font-weight: 700;
      color: #f0f0f0;
    }

    .subtitle {
      color: #777;
      margin: 0;
      font-size: 13px;
    }

    main {
      padding: 20px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .control-group {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .control-label {
      min-width: 60px;
      font-size: 11px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding-top: 9px;
      flex-shrink: 0;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .btn {
      padding: 7px 13px;
      border-radius: 6px;
      border: 1.5px solid #333;
      background: #1c1c1c;
      color: #aaa;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      white-space: nowrap;
      line-height: 1;
    }

    .btn:hover:not(.selected) {
      background: #262626;
      border-color: #555;
      color: #ddd;
    }

    .btn.selected {
      background: #c47c10;
      border-color: #c47c10;
      color: #fff;
      box-shadow: 0 0 0 2px rgba(196, 124, 16, 0.28);
    }

    /* ── Info panel ── */
    .info {
      margin: 0 0 20px;
      padding: 12px 16px;
      background: #161616;
      border: 1px solid #242424;
      border-radius: 8px;
    }

    #summary {
      font-size: 15px;
      font-weight: 600;
      color: #e8e8e8;
    }

    .degree-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .chip {
      padding: 4px 10px;
      border: 1px solid #2e2e2e;
      border-radius: 999px;
      background: #1e1e1e;
      color: #c0c0c0;
      font-size: 13px;
    }

    /* ── Fretboard scroll wrapper ── */
    .fretboard-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 10px;
      padding-bottom: 4px;
    }

    /* ── Fretboard container ── */
    .fretboard {
      display: inline-block;
      background: repeating-linear-gradient(
        90deg,
        #130a04 0px,
        #1b0e06 10px,
        #130a04 20px,
        #190d06 30px,
        #130a04 40px
      );
      border-radius: 10px;
      padding: 14px 18px 16px 14px;
      min-width: max-content;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.7), 0 4px 24px rgba(0,0,0,0.6);
      border: 1px solid #0a0604;
    }

    /* Shared grid: label col + 13 fret cols */
    .fb-row {
      display: grid;
      grid-template-columns: 44px repeat(13, 64px);
    }

    /* ── Fret number header ── */
    .fret-num-header {
      margin-bottom: 6px;
    }

    .fret-num-cell {
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #5a4020;
    }

    /* ── String rows ── */
    .string-row {
      position: relative;
    }

    /* The string line behind all cells */
    .string-row::before {
      content: '';
      position: absolute;
      left: 44px;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 0;
      border-radius: 1px;
    }

    .string-row[data-string-idx="0"]::before {
      height: 1px;
      background: linear-gradient(90deg, #a09878, #ccc0a0, #a09878);
    }
    .string-row[data-string-idx="1"]::before {
      height: 1px;
      background: linear-gradient(90deg, #a09878, #ccc0a0, #a09878);
    }
    .string-row[data-string-idx="2"]::before {
      height: 2px;
      background: linear-gradient(90deg, #a09060, #c0b080, #a09060);
    }
    .string-row[data-string-idx="3"]::before {
      height: 2px;
      background: linear-gradient(90deg, #a09060, #c0b080, #a09060);
    }
    .string-row[data-string-idx="4"]::before {
      height: 3px;
      background: linear-gradient(90deg, #988050, #b89868, #988050);
    }
    .string-row[data-string-idx="5"]::before {
      height: 4px;
      background: linear-gradient(90deg, #988050, #b89868, #988050);
    }

    /* String name label */
    .string-label {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #5a4020;
      position: relative;
      z-index: 2;
    }

    /* ── Fret cells ── */
    .fret-cell {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      /* Fret wire: thin right border */
      border-right: 2px solid rgba(140, 110, 60, 0.55);
    }

    /* Nut: thick bright bar after open-string column */
    .fret-cell.fret-open {
      border-right: 8px solid rgba(225, 210, 180, 0.9);
    }

    /* Last fret: no border */
    .fret-cell:last-child {
      border-right: none;
    }

    /* ── Position markers ── */
    .markers-row {
      margin-top: 7px;
    }

    .marker-cell {
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .marker-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #3d2810;
      flex-shrink: 0;
    }

    /* ── Note badges ── */
    .note-badge {
      position: relative;
      z-index: 3;
      min-width: 36px;
      height: 36px;
      padding: 0 7px;
      border-radius: 999px;
      background: #1a5fb0;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
      letter-spacing: -0.02em;
    }

    .fret-cell.root .note-badge {
      background: #bf6f0c;
      color: #fff;
    }

    footer {
      padding: 20px 24px;
      color: #444;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>FretTone</h1>
    <p class="subtitle">ジャズギター初心者がコードトーン・スケール・度数をギター指板上で確認できる無料Webアプリです。</p>
    <p class="subtitle">ii-V-I、コードトーン練習、アドリブ練習の補助に使えます。</p>
  </header>

  <main>
    <section class="controls">
      <div class="control-group">
        <div class="control-label">Root</div>
        <div class="btn-row" id="rootBtns"></div>
      </div>
      <div class="control-group">
        <div class="control-label">Mode</div>
        <div class="btn-row" id="modeBtns">
          <button class="btn" data-value="chord">Chord</button>
          <button class="btn" data-value="scale">Scale</button>
        </div>
      </div>
      <div class="control-group">
        <div class="control-label">Type</div>
        <div class="btn-row" id="typeBtns"></div>
      </div>
      <div class="control-group">
        <div class="control-label">Display</div>
        <div class="btn-row" id="displayBtns">
          <button class="btn" data-value="degree">Degree</button>
          <button class="btn" data-value="note">Note</button>
        </div>
      </div>
    </section>

    <section class="info">
      <strong id="summary"></strong>
      <div class="degree-list" id="degreeList"></div>
    </section>

    <div class="fretboard-scroll">
      <div id="fretboard" class="fretboard"></div>
    </div>
  </main>

  <footer>Built for checking chord tones and scales on guitar.</footer>

  <script>
    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    const guitarStrings = [
      { name: "e", open: "E" },
      { name: "B", open: "B" },
      { name: "G", open: "G" },
      { name: "D", open: "D" },
      { name: "A", open: "A" },
      { name: "E", open: "E" }
    ];

    const chords = {
      "M7": [
        { interval: 0, degree: "R" },
        { interval: 4, degree: "3" },
        { interval: 7, degree: "5" },
        { interval: 11, degree: "7" }
      ],
      "m7": [
        { interval: 0, degree: "R" },
        { interval: 3, degree: "♭3" },
        { interval: 7, degree: "5" },
        { interval: 10, degree: "♭7" }
      ],
      "7": [
        { interval: 0, degree: "R" },
        { interval: 4, degree: "3" },
        { interval: 7, degree: "5" },
        { interval: 10, degree: "♭7" }
      ],
      "m7♭5": [
        { interval: 0, degree: "R" },
        { interval: 3, degree: "♭3" },
        { interval: 6, degree: "♭5" },
        { interval: 10, degree: "♭7" }
      ],
      "dim7": [
        { interval: 0, degree: "R" },
        { interval: 3, degree: "♭3" },
        { interval: 6, degree: "♭5" },
        { interval: 9, degree: "𝄫7" }
      ]
    };

    const scales = {
      "Major": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 4, degree: "3" },
        { interval: 5, degree: "4" },
        { interval: 7, degree: "5" },
        { interval: 9, degree: "6" },
        { interval: 11, degree: "7" }
      ],
      "Natural Minor": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 3, degree: "♭3" },
        { interval: 5, degree: "4" },
        { interval: 7, degree: "5" },
        { interval: 8, degree: "♭6" },
        { interval: 10, degree: "♭7" }
      ],
      "Dorian": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 3, degree: "♭3" },
        { interval: 5, degree: "4" },
        { interval: 7, degree: "5" },
        { interval: 9, degree: "6" },
        { interval: 10, degree: "♭7" }
      ],
      "Mixolydian": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 4, degree: "3" },
        { interval: 5, degree: "4" },
        { interval: 7, degree: "5" },
        { interval: 9, degree: "6" },
        { interval: 10, degree: "♭7" }
      ],
      "Altered": [
        { interval: 0, degree: "R" },
        { interval: 1, degree: "♭9" },
        { interval: 3, degree: "#9" },
        { interval: 4, degree: "3" },
        { interval: 6, degree: "♭5" },
        { interval: 8, degree: "#5" },
        { interval: 10, degree: "♭7" }
      ],
      "Lydian Dominant": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 4, degree: "3" },
        { interval: 6, degree: "#4" },
        { interval: 7, degree: "5" },
        { interval: 9, degree: "6" },
        { interval: 10, degree: "♭7" }
      ],
      "Half-Whole Diminished": [
        { interval: 0, degree: "R" },
        { interval: 1, degree: "♭9" },
        { interval: 3, degree: "#9" },
        { interval: 4, degree: "3" },
        { interval: 6, degree: "♭5" },
        { interval: 7, degree: "5" },
        { interval: 9, degree: "6" },
        { interval: 10, degree: "♭7" }
      ],
      "Whole Tone": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 4, degree: "3" },
        { interval: 6, degree: "♭5" },
        { interval: 8, degree: "#5" },
        { interval: 10, degree: "♭7" }
      ]
    };

    // Explicit type ordering (JS sorts integer-like keys first, so we can't use Object.keys order)
    const CHORD_TYPES = ["M7", "m7", "7", "m7♭5", "dim7"];
    const SCALE_TYPES = ["Major", "Natural Minor", "Dorian", "Mixolydian", "Altered", "Lydian Dominant", "Half-Whole Diminished", "Whole Tone"];

    // 0 = no marker, 1 = single dot, 2 = double dot
    const MARKERS = [0, 0, 0, 1, 0, 1, 0, 1, 0, 1, 0, 0, 2];

    const state = { root: "C", mode: "chord", type: "M7", display: "degree" };

    function noteFromInterval(root, interval) {
      return notes[(notes.indexOf(root) + interval) % 12];
    }

    function getFretNote(openNote, fret) {
      return notes[(notes.indexOf(openNote) + fret) % 12];
    }

    function setSelected(containerId, value) {
      document.getElementById(containerId).querySelectorAll(".btn").forEach(btn => {
        btn.classList.toggle("selected", btn.dataset.value === value);
      });
    }

    function buildTypeButtons() {
      const source = state.mode === "chord" ? chords : scales;
      const types = state.mode === "chord" ? CHORD_TYPES : SCALE_TYPES;
      const container = document.getElementById("typeBtns");
      container.innerHTML = "";
      types.forEach(val => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.textContent = val;
        btn.dataset.value = val;
        btn.addEventListener("click", () => {
          state.type = val;
          setSelected("typeBtns", val);
          render();
        });
        container.appendChild(btn);
      });
      if (!source[state.type]) state.type = types[0];
      setSelected("typeBtns", state.type);
    }

    function initControls() {
      // Root
      const rootContainer = document.getElementById("rootBtns");
      notes.forEach(note => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.textContent = note;
        btn.dataset.value = note;
        btn.addEventListener("click", () => {
          state.root = note;
          setSelected("rootBtns", note);
          render();
        });
        rootContainer.appendChild(btn);
      });
      setSelected("rootBtns", state.root);

      // Mode
      document.getElementById("modeBtns").querySelectorAll(".btn").forEach(btn => {
        btn.addEventListener("click", () => {
          if (state.mode === btn.dataset.value) return;
          state.mode = btn.dataset.value;
          state.type = (state.mode === "chord" ? CHORD_TYPES : SCALE_TYPES)[0];
          setSelected("modeBtns", state.mode);
          buildTypeButtons();
          render();
        });
      });
      setSelected("modeBtns", state.mode);

      // Type
      buildTypeButtons();

      // Display
      document.getElementById("displayBtns").querySelectorAll(".btn").forEach(btn => {
        btn.addEventListener("click", () => {
          state.display = btn.dataset.value;
          setSelected("displayBtns", btn.dataset.value);
          render();
        });
      });
      setSelected("displayBtns", state.display);
    }

    function render() {
      const { root, mode, type, display } = state;
      const source = mode === "chord" ? chords : scales;
      const formula = source[type];
      if (!formula) return;

      const activeNotes = formula.map(item => ({
        note: noteFromInterval(root, item.interval),
        degree: item.degree
      }));
      const noteMap = new Map(activeNotes.map(item => [item.note, item.degree]));

      document.getElementById("summary").textContent =
        `${root} ${type}  —  ${activeNotes.map(i => i.note).join("  ")}`;

      const degreeList = document.getElementById("degreeList");
      degreeList.innerHTML = "";
      activeNotes.forEach(item => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = `${item.degree}: ${item.note}`;
        degreeList.appendChild(chip);
      });

      const fb = document.getElementById("fretboard");
      fb.innerHTML = "";

      // Fret number header row
      const headerRow = document.createElement("div");
      headerRow.className = "fb-row fret-num-header";
      const corner = document.createElement("div");
      corner.className = "fret-num-cell";
      headerRow.appendChild(corner);
      for (let f = 0; f <= 12; f++) {
        const cell = document.createElement("div");
        cell.className = "fret-num-cell";
        cell.textContent = f;
        headerRow.appendChild(cell);
      }
      fb.appendChild(headerRow);

      // String rows
      guitarStrings.forEach((string, idx) => {
        const row = document.createElement("div");
        row.className = "string-row fb-row";
        row.dataset.stringIdx = idx;

        const label = document.createElement("div");
        label.className = "string-label";
        label.textContent = string.name;
        row.appendChild(label);

        for (let fret = 0; fret <= 12; fret++) {
          const note = getFretNote(string.open, fret);
          const cell = document.createElement("div");
          cell.className = "fret-cell" + (fret === 0 ? " fret-open" : "");

          if (noteMap.has(note)) {
            if (note === root) cell.classList.add("root");
            const badge = document.createElement("div");
            badge.className = "note-badge";
            badge.textContent = display === "note" ? note : noteMap.get(note);
            cell.appendChild(badge);
          }

          row.appendChild(cell);
        }

        fb.appendChild(row);
      });

      // Position markers row
      const markersRow = document.createElement("div");
      markersRow.className = "fb-row markers-row";
      markersRow.appendChild(document.createElement("div"));
      for (let f = 0; f <= 12; f++) {
        const cell = document.createElement("div");
        cell.className = "marker-cell";
        for (let d = 0; d < MARKERS[f]; d++) {
          const dot = document.createElement("span");
          dot.className = "marker-dot";
          cell.appendChild(dot);
        }
        markersRow.appendChild(cell);
      }
      fb.appendChild(markersRow);
    }

    initControls();
    render();
  </script>
</body>
</html>
