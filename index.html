<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FretTone - Guitar Chord Tone Viewer</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #111;
      color: #eee;
    }

    header {
      padding: 24px;
      border-bottom: 1px solid #333;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      color: #aaa;
      margin: 0;
    }

    main {
      padding: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      align-items: end;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
      color: #ccc;
    }

    select, button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1d1d1d;
      color: #eee;
      font-size: 15px;
    }

    button {
      cursor: pointer;
    }

    .info {
      margin: 16px 0 24px;
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #ddd;
    }

    .fretboard {
      overflow-x: auto;
      border: 1px solid #333;
      border-radius: 12px;
      background: #171717;
      padding: 12px;
    }

    .string-row {
      display: grid;
      grid-template-columns: 42px repeat(13, 64px);
      min-width: max-content;
      border-bottom: 1px solid #333;
    }

    .string-row:last-child {
      border-bottom: none;
    }

    .string-name {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-weight: bold;
      border-right: 1px solid #333;
    }

    .fret {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid #333;
      position: relative;
      color: #555;
      font-size: 13px;
    }

    .fret:last-child {
      border-right: none;
    }

    .active {
      color: #111;
    }

    .note-badge {
      min-width: 34px;
      height: 34px;
      padding: 0 6px;
      border-radius: 999px;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #111;
    }

    .root .note-badge {
      background: #ffd166;
    }

    .degree-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      padding: 6px 10px;
      border: 1px solid #444;
      border-radius: 999px;
      background: #1d1d1d;
      color: #ddd;
      font-size: 14px;
    }

    footer {
      padding: 24px;
      color: #777;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>FretTone</h1>
    <p class="subtitle">ギター指板でコードトーンとスケールを確認する小さいWebアプリ</p>
  </header>

  <main>
    <section class="controls">
      <label>
        Root
        <select id="rootSelect"></select>
      </label>

      <label>
        Mode
        <select id="modeSelect">
          <option value="chord">Chord</option>
          <option value="scale">Scale</option>
        </select>
      </label>

      <label>
        Type
        <select id="typeSelect"></select>
      </label>

      <label>
        Display
        <select id="displaySelect">
          <option value="degree">Degree</option>
          <option value="note">Note</option>
        </select>
      </label>
    </section>

    <section class="info">
      <strong id="summary"></strong>
      <div class="degree-list" id="degreeList"></div>
    </section>

    <section class="fretboard" id="fretboard"></section>
  </main>

  <footer>
    Built for checking chord tones and scales on guitar.
  </footer>

  <script>
    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    const guitarStrings = [
      { name: "1st", open: "E" },
      { name: "2nd", open: "B" },
      { name: "3rd", open: "G" },
      { name: "4th", open: "D" },
      { name: "5th", open: "A" },
      { name: "6th", open: "E" }
    ];

    const chords = {
      "M7": [
        { interval: 0, degree: "R" },
        { interval: 4, degree: "3" },
        { interval: 7, degree: "5" },
        { interval: 11, degree: "7" }
      ],
      "m7": [
        { interval: 0, degree: "R" },
        { interval: 3, degree: "♭3" },
        { interval: 7, degree: "5" },
        { interval: 10, degree: "♭7" }
      ],
      "7": [
        { interval: 0, degree: "R" },
        { interval: 4, degree: "3" },
        { interval: 7, degree: "5" },
        { interval: 10, degree: "♭7" }
      ],
      "m7♭5": [
        { interval: 0, degree: "R" },
        { interval: 3, degree: "♭3" },
        { interval: 6, degree: "♭5" },
        { interval: 10, degree: "♭7" }
      ],
      "dim7": [
        { interval: 0, degree: "R" },
        { interval: 3, degree: "♭3" },
        { interval: 6, degree: "♭5" },
        { interval: 9, degree: "𝄫7" }
      ]
    };

    const scales = {
      "Major": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 4, degree: "3" },
        { interval: 5, degree: "4" },
        { interval: 7, degree: "5" },
        { interval: 9, degree: "6" },
        { interval: 11, degree: "7" }
      ],
      "Natural Minor": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 3, degree: "♭3" },
        { interval: 5, degree: "4" },
        { interval: 7, degree: "5" },
        { interval: 8, degree: "♭6" },
        { interval: 10, degree: "♭7" }
      ],
      "Dorian": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 3, degree: "♭3" },
        { interval: 5, degree: "4" },
        { interval: 7, degree: "5" },
        { interval: 9, degree: "6" },
        { interval: 10, degree: "♭7" }
      ],
      "Mixolydian": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 4, degree: "3" },
        { interval: 5, degree: "4" },
        { interval: 7, degree: "5" },
        { interval: 9, degree: "6" },
        { interval: 10, degree: "♭7" }
      ],
      "Altered": [
        { interval: 0, degree: "R" },
        { interval: 1, degree: "♭9" },
        { interval: 3, degree: "#9" },
        { interval: 4, degree: "3" },
        { interval: 6, degree: "♭5" },
        { interval: 8, degree: "#5" },
        { interval: 10, degree: "♭7" }
      ],
      "Lydian Dominant": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 4, degree: "3" },
        { interval: 6, degree: "#4" },
        { interval: 7, degree: "5" },
        { interval: 9, degree: "6" },
        { interval: 10, degree: "♭7" }
      ],
      "Half-Whole Diminished": [
        { interval: 0, degree: "R" },
        { interval: 1, degree: "♭9" },
        { interval: 3, degree: "#9" },
        { interval: 4, degree: "3" },
        { interval: 6, degree: "♭5" },
        { interval: 7, degree: "5" },
        { interval: 9, degree: "6" },
        { interval: 10, degree: "♭7" }
      ],
      "Whole Tone": [
        { interval: 0, degree: "R" },
        { interval: 2, degree: "2" },
        { interval: 4, degree: "3" },
        { interval: 6, degree: "♭5" },
        { interval: 8, degree: "#5" },
        { interval: 10, degree: "♭7" }
      ]
    };

    const rootSelect = document.getElementById("rootSelect");
    const modeSelect = document.getElementById("modeSelect");
    const typeSelect = document.getElementById("typeSelect");
    const displaySelect = document.getElementById("displaySelect");
    const fretboard = document.getElementById("fretboard");
    const summary = document.getElementById("summary");
    const degreeList = document.getElementById("degreeList");

    notes.forEach(note => {
      const option = document.createElement("option");
      option.value = note;
      option.textContent = note;
      rootSelect.appendChild(option);
    });

    rootSelect.value = "C";

    function populateTypes() {
      const mode = modeSelect.value;
      const source = mode === "chord" ? chords : scales;

      typeSelect.innerHTML = "";

      Object.keys(source).forEach(type => {
        const option = document.createElement("option");
        option.value = type;
        option.textContent = type;
        typeSelect.appendChild(option);
      });
    }

    function noteFromInterval(root, interval) {
      const rootIndex = notes.indexOf(root);
      return notes[(rootIndex + interval) % 12];
    }

    function getFretNote(openNote, fret) {
      const openIndex = notes.indexOf(openNote);
      return notes[(openIndex + fret) % 12];
    }

    function render() {
      const root = rootSelect.value;
      const mode = modeSelect.value;
      const type = typeSelect.value;
      const display = displaySelect.value;
      const source = mode === "chord" ? chords : scales;
      const formula = source[type];

      const activeNotes = formula.map(item => ({
        note: noteFromInterval(root, item.interval),
        degree: item.degree,
        interval: item.interval
      }));

      const noteMap = new Map(activeNotes.map(item => [item.note, item.degree]));

      summary.textContent = `${root} ${type} - ${activeNotes.map(item => item.note).join(" ")}`;

      degreeList.innerHTML = "";
      activeNotes.forEach(item => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = `${item.degree}: ${item.note}`;
        degreeList.appendChild(chip);
      });

      fretboard.innerHTML = "";

      guitarStrings.forEach(string => {
        const row = document.createElement("div");
        row.className = "string-row";

        const stringName = document.createElement("div");
        stringName.className = "string-name";
        stringName.textContent = string.name;
        row.appendChild(stringName);

        for (let fret = 0; fret <= 12; fret++) {
          const note = getFretNote(string.open, fret);
          const cell = document.createElement("div");
          cell.className = "fret";

          if (noteMap.has(note)) {
            cell.classList.add("active");
            if (note === root) {
              cell.classList.add("root");
            }

            const badge = document.createElement("div");
            badge.className = "note-badge";
            badge.textContent = display === "note" ? note : noteMap.get(note);
            cell.appendChild(badge);
          } else {
            cell.textContent = fret === 0 ? "open" : fret;
          }

          row.appendChild(cell);
        }

        fretboard.appendChild(row);
      });
    }

    modeSelect.addEventListener("change", () => {
      populateTypes();
      render();
    });

    rootSelect.addEventListener("change", render);
    typeSelect.addEventListener("change", render);
    displaySelect.addEventListener("change", render);

    populateTypes();
    render();
  </script>
</body>
</html>
